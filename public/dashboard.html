<title>Spootie</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<style>
  :root{
    --bg: #f2f3f6;
    --bg-soft: #e8eaef;
    --surface: #ffffff;
    --ink: #14171c;
    --ink-soft: #5b616e;
    --ink-faint: #9297a3;
    --line: #e1e3e9;
    --line-soft: #ececf0;
    --accent: #7dd992;
    --accent-deep: #2c7a45;
    --accent-wash: #e6f7eb;
    --queued: #b5852f;
    --queued-wash: #fbf1e0;
    --danger: #c1373d;
    --radius: 8px;
    --gap: 10px;
    --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.45;
  }
  ::selection{ background: var(--accent); color:#0d1a12; }

  :focus{ outline: none; }
  :focus-visible{
    outline: 2px solid var(--accent-deep);
    outline-offset: 2px;
    border-radius: 6px;
  }

  button, input{ font-family: inherit; font-size: inherit; color: inherit; }
  button{ cursor:pointer; background:none; border:none; }

  .app{
    display: grid;
    grid-template-columns: 224px minmax(0, 1fr);
    min-height: 100vh;
  }

  /* ---------- SIDEBAR ---------- */
  .rail{
    background: var(--surface);
    border-right: 1px solid var(--line);
    padding: 18px 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .brand{ display:flex; align-items:center; gap:9px; padding: 0 2px; }
  .brand-mark{ flex: none; display:flex; position: relative; }
  .status-dot{
    position:absolute;
    right: -2px; bottom: -2px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--surface);
    animation: pulse 2.6s ease-in-out infinite;
  }
  .status-dot.off{ background: var(--queued); animation-duration: 1.2s; }
  @keyframes pulse{ 0%,100%{ opacity: 1; } 50%{ opacity: .5; } }
  .brand-word{ font-size: 16px; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); }

  .rail-upload{
    display:flex; align-items:center; justify-content:center; gap:7px;
    width:100%;
    padding: 9px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--ink);
    background: var(--ink);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    transition: background .13s, border-color .13s;
  }
  .rail-upload:hover{ background:#000; border-color:#000; }
  .rail-upload svg{ flex:none; }

  .nav{ display:flex; flex-direction:column; gap: 1px; }
  .nav-item{
    display:flex; align-items:center; gap: 9px;
    padding: 7px 9px;
    border-radius: var(--radius);
    color: var(--ink-soft);
    font-weight: 500;
    font-size: 13px;
    border: none;
    width: 100%;
    text-align: left;
  }
  .nav-item svg{ flex:none; opacity:.7; }
  .nav-item:hover{ background: var(--bg-soft); color: var(--ink); }
  .nav-item.is-active{ background: var(--bg-soft); color: var(--ink); font-weight: 700; }
  .nav-item.is-active svg{ opacity: 1; color: var(--accent-deep); }
  .nav-count{
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 20px;
    background: var(--bg-soft);
    color: var(--ink-soft);
  }
  .nav-item.is-active .nav-count{ background: #fff; }

  .rail-spacer{ flex: 1; }

  .rail-foot{
    border-top: 1px solid var(--line-soft);
    padding-top: 12px;
    display:flex; flex-direction:column; gap: 3px;
  }
  .rail-foot p{ margin: 0; font-size: 12px; color: var(--ink-faint); font-weight: 500; }
  .rail-foot p.stat{ color: var(--ink-soft); font-weight: 600; }

  /* ---------- MAIN ---------- */
  .main{ min-width: 0; position: relative; overflow-x: hidden; }

  .toolbar{
    position: sticky; top: 0; z-index: 5;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 16px 28px;
    display:flex; align-items: baseline; gap: 12px;
  }
  .page-title{ font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .page-sub{
    font-size: 13px; color: var(--ink-faint); font-weight: 500;
    text-decoration: none;
    border: none; background: none; padding: 0;
  }
  .page-sub:hover{ color: var(--accent-deep); }

  .content{ padding: 22px 28px 64px; max-width: 1180px; }

  /* banners: offline/reauth states, restyled from the mockup's neutral palette */
  .banner{
    margin: 0 0 16px;
    padding: 9px 14px;
    border-radius: var(--radius);
    border: 1px solid color-mix(in srgb, var(--queued) 35%, var(--line));
    background: var(--queued-wash);
    color: var(--queued);
    font-size: 12.5px;
    font-weight: 600;
  }
  .banner.err{
    border-color: color-mix(in srgb, var(--danger) 35%, var(--line));
    background: color-mix(in srgb, var(--danger) 8%, #fff);
    color: var(--danger);
  }

  .date-heading{
    display:flex; align-items:center; gap: 12px;
    margin: 28px 0 12px;
    font-size: 12px; font-weight: 700; letter-spacing: .03em;
    text-transform: uppercase; color: var(--ink-faint);
  }
  .date-heading:first-child{ margin-top: 2px; }
  .date-heading::after{ content:""; height:1px; flex:1; background: var(--line); }

  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: var(--gap);
  }

  /* ---------- TILE ---------- */
  .tile{
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: var(--radius);
    background: #eef0f4;
    isolation: isolate;
  }
  .tile .shot{ position:absolute; inset:0; width:100%; height:100%; display:block; z-index:0; object-fit:cover; object-position:center; }

  .tile-ph{
    position:absolute; inset:0; z-index:0;
    display:flex; align-items:center; justify-content:center;
    color: var(--ink-faint);
  }

  /* pending at-rest marker: 2px brand ring */
  .tile.is-pending .ring{
    position:absolute; inset:0;
    border: 2px solid var(--accent);
    border-radius: var(--radius);
    box-shadow: inset 0 0 0 1px rgba(20,23,28,.06);
    z-index: 2;
    pointer-events: none;
  }
  /* queued at-rest marker: tiny spinner in corner */
  .tile .queued-mark{
    position:absolute; top: 8px; left: 8px; z-index: 2;
    width: 18px; height:18px;
    display:flex; align-items:center; justify-content:center;
    border-radius: 50%;
    background: rgba(10,12,16,.55);
    backdrop-filter: blur(3px);
  }
  .tile .queued-mark .spin{
    width: 10px; height:10px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,.35);
    border-top-color: #fff;
    animation: spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  /* hover scrim — also shown on keyboard focus-within so actions are reachable
     without a mouse */
  .tile::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(0deg, rgba(10,12,16,.82) 0%, rgba(10,12,16,.32) 44%, transparent 68%);
    opacity: 0;
    transition: opacity .14s ease;
    z-index: 3;
  }
  .tile:hover::after, .tile:focus-within::after{ opacity: 1; }

  .tile-info{
    position:absolute; left: 0; right: 0; bottom: 0; z-index: 4;
    padding: 10px;
    display:flex; flex-direction:column; gap: 8px;
    opacity: 0;
    transform: translateY(3px);
    transition: opacity .14s ease, transform .14s ease;
  }
  .tile:hover .tile-info, .tile:focus-within .tile-info{ opacity: 1; transform: translateY(0); }

  .tile-name{
    font-size: 12px; font-weight: 600; color: #fff;
    white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
  }
  .tile-time{ font-size: 11px; color: rgba(255,255,255,.65); font-weight: 500; }
  .tile-time.err{ color: #ffb4b4; }
  .tile-meta{ display:flex; justify-content:space-between; align-items:center; gap: 8px; min-width:0; }

  .tile-actions{ display:flex; gap: 6px; }
  .ibtn{
    flex: none;
    width: 28px; height: 28px;
    display:flex; align-items:center; justify-content:center;
    border-radius: 7px;
    border: none;
    background: rgba(255,255,255,.18);
    color: #fff;
    transition: background .12s;
  }
  .ibtn:hover{ background: rgba(255,255,255,.30); }
  .ibtn:focus-visible{ outline: 2px solid #fff; outline-offset: 2px; }
  .ibtn.approve{ background: var(--accent-deep); }
  .ibtn.approve:hover{ background: #256a3b; }
  .ibtn.discard:hover{ background: var(--danger); }
  .ibtn.is-copied{ background: var(--accent-deep); }
  .ibtn svg{ flex:none; }
  .ibtn:disabled{ opacity: .5; cursor: default; }

  /* ---------- empty state ---------- */
  .empty{
    padding: 90px 20px;
    text-align: center;
    color: var(--ink-faint);
  }
  .empty svg{ color: var(--ink-faint); margin-bottom: 12px; }
  .empty p{ margin: 0; font-size: 14px; font-weight: 500; color: var(--ink-soft); }

  /* ---------- drag overlay ---------- */
  .drop-overlay{
    position: fixed; inset: 12px; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    border-radius: 16px;
    border: 2px dashed var(--accent-deep);
    background: color-mix(in srgb, var(--accent-wash) 92%, transparent);
    opacity: 0; pointer-events: none;
    transition: opacity .12s ease;
  }
  .main.is-dragging .drop-overlay{ opacity: 1; pointer-events: auto; }
  .drop-overlay-label{
    display:flex; flex-direction:column; align-items:center; gap: 8px;
    color: var(--accent-deep); font-weight: 700; font-size: 14px;
  }

  /* ---------- responsive ---------- */
  @media (max-width: 860px){
    .app{ grid-template-columns: 1fr; }
    .rail{
      position: sticky; top:0; height:auto;
      flex-direction:row; align-items:center;
      padding: 10px 14px; gap: 12px;
      overflow-x:auto; z-index: 6;
      border-right:none; border-bottom: 1px solid var(--line);
    }
    .rail-spacer{ display:none; }
    .rail-upload{ width:auto; white-space:nowrap; }
    .nav{ flex-direction:row; }
    .nav-item{ white-space:nowrap; }
    .rail-foot{ display:none; }
    .toolbar{ padding: 14px 16px; }
    .content{ padding: 18px 16px 48px; }
  }
  @media (max-width: 480px){
    .grid{ grid-template-columns: repeat(2, 1fr); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>

<div class="app" id="app"></div>

<script type="module">
    import {
        html, render, useState, useEffect, useRef,
    } from "/vendor/preact-standalone.mjs";

    // The API token comes from the URL `spootie ui` opens; keep it in this tab's
    // sessionStorage and resend it as a `token` query param on every API call.
    // (No cookie: cookies can't be port-scoped and would leak it to other
    // 127.0.0.1 servers.)
    const TOKEN = (() => {
        const fromUrl = new URL(location.href).searchParams.get("token");
        try {
            if (fromUrl) { sessionStorage.setItem("spootie_token", fromUrl); return fromUrl; }
            return sessionStorage.getItem("spootie_token") || "";
        } catch (_) {
            return fromUrl || "";
        }
    })();

    const withToken = (path) =>
        path + (path.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(TOKEN);

    /**
     * Copy text via the Clipboard API. The dashboard is only served over
     * loopback (a secure context), so writeText is always available; return
     * false only if it rejects.
     */
    const copyText = async (text) => {
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch (_) {
            return false;
        }
    };

    const startOfDay = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate());

    /** "Today" / "Yesterday" / "28 June 2026" for a date-group header. */
    const groupLabel = (iso) => {
        const dt = new Date(iso);
        if (Number.isNaN(dt.getTime())) return "Unknown date";
        const diff = Math.round((startOfDay(new Date()) - startOfDay(dt)) / 86400000);
        if (diff === 0) return "Today";
        if (diff === 1) return "Yesterday";
        return dt.toLocaleDateString(undefined, { day: "numeric", month: "long", year: "numeric" });
    };

    /** 24-hour HH:MM for a tile's timestamp. */
    const fmtTime = (iso) => {
        const dt = new Date(iso);
        if (Number.isNaN(dt.getTime())) return "--:--";
        return dt.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false });
    };

    /**
     * POST a JSON body to an /api mutation and throw the server's error message
     * (falling back to `fallbackMsg`) on any non-2xx response.
     */
    const postAction = async (path, body, fallbackMsg) => {
        const res = await fetch(withToken(path), {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(body),
        });
        if (!res.ok) {
            let msg = fallbackMsg;
            try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (_) {}
            throw new Error(msg);
        }
    };

    const deleteItem = (kind, id) => postAction("/api/delete", { kind, id }, "Delete failed");
    /** Approve a pending screenshot: uploads it to R2 (or queues it on a network error). */
    const approveItem = (id) => postAction("/api/approve", { id }, "Approve failed");
    /** Discard a pending screenshot without uploading it. */
    const discardItem = (id) => postAction("/api/discard", { id }, "Discard failed");

    /** Inline Lucide-style icon set, kept minimal and local (no icon font/CDN). */
    const Icon = {
        upload: html`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 19V6M6 12l6-6 6 6"/><path d="M5 20h14"/></svg>`,
        grid: html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>`,
        clock: html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`,
        uploaded: html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v6H4z"/><path d="M4 14h10v6H4z"/><path d="M17 14v6M20 17h-6"/></svg>`,
        queued: html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>`,
        check: html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`,
        x: html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`,
        copy: html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
        trash: html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`,
        file: html`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>`,
        dropArrow: html`<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>`,
    };

    /** The Spootie mark: a rounded square with a green corner-bracket glyph. */
    const BrandMark = html`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="26" height="26">
            <rect x="1" y="1" width="30" height="30" rx="7.5" fill="#111317"/>
            <g fill="none" stroke="#7dd992" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 13V9h4"/><path d="M19 9h4v4"/><path d="M23 19v4h-4"/><path d="M13 23H9v-4"/>
            </g>
            <circle cx="16" cy="16" r="1.7" fill="#7dd992"/>
        </svg>`;

    /**
     * One drop in the grid. Its actions depend on kind: uploaded gets
     * Copy/Delete, pending gets Approve/Discard, queued gets Cancel. All
     * mutations are optimistic — the row disappears immediately and the next
     * 2s poll reconciles with the server.
     */
    function Tile({ item, onRemove }) {
        const [busy, setBusy] = useState(false);
        const [err, setErr] = useState("");
        const [copied, setCopied] = useState(false);
        const [thumbBroken, setThumbBroken] = useState(false);
        const timers = useRef([]);
        useEffect(() => () => { timers.current.forEach(clearTimeout); }, []);
        const track = (fn, ms) => { timers.current.push(setTimeout(fn, ms)); };

        const onCopy = async () => {
            const ok = await copyText(item.url || "");
            if (ok) { setCopied(true); track(() => setCopied(false), 1400); }
            else setErr("Couldn't copy");
        };
        // Run a tile mutation: mark busy, call the API, optimistically drop the
        // row on success, or re-enable and surface the error on failure.
        const runAction = async (call, kind, fallbackMsg) => {
            setBusy(true); setErr("");
            try { await call(); onRemove(kind, item.id); }
            catch (e) { setBusy(false); setErr(e.message || fallbackMsg); }
        };
        const onDelete = () => runAction(() => deleteItem("uploaded", item.id), "uploaded", "Delete failed");
        const onApprove = () => runAction(() => approveItem(item.id), "pending", "Approve failed");
        const onDiscard = () => runAction(() => discardItem(item.id), "pending", "Discard failed");
        const onCancel = () => runAction(() => deleteItem("queued", item.id), "queued", "Cancel failed");

        // Thumbnails are local-only; <img> can't send headers, so the token
        // rides the query string like every other API call.
        const thumbSrc = item.thumb && !thumbBroken
            ? withToken("/api/thumb?key=" + encodeURIComponent(item.id))
            : null;
        const timeLabel = err ? err : item.kind === "queued" ? "Retrying…" : fmtTime(item.date);

        return html`
            <article class=${"tile" + (item.kind === "pending" ? " is-pending" : "")}>
                ${item.kind === "pending" && html`<span class="ring" aria-hidden="true"></span>`}
                ${item.kind === "queued" && html`<span class="queued-mark" aria-hidden="true"><span class="spin"></span></span>`}
                ${thumbSrc
                    ? html`<img class="shot" loading="lazy" alt="" src=${thumbSrc} onError=${() => setThumbBroken(true)} />`
                    : html`<span class="tile-ph" aria-hidden="true">${Icon.file}</span>`}
                <div class="tile-info">
                    <div class="tile-meta"><span class="tile-name" title=${item.fileName}>${item.fileName}</span></div>
                    <div class="tile-meta">
                        <span class=${"tile-time" + (err ? " err" : "")}>${timeLabel}</span>
                        <span class="tile-actions">
                            ${item.kind === "uploaded" && html`
                                <button class=${"ibtn" + (copied ? " is-copied" : "")} type="button" aria-label="Copy link" onClick=${onCopy}>${copied ? Icon.check : Icon.copy}</button>
                                <button class="ibtn discard" type="button" aria-label="Delete" disabled=${busy} onClick=${onDelete}>${Icon.trash}</button>`}
                            ${item.kind === "pending" && html`
                                <button class="ibtn approve" type="button" aria-label="Approve" disabled=${busy} onClick=${onApprove}>${Icon.check}</button>
                                <button class="ibtn discard" type="button" aria-label="Discard" disabled=${busy} onClick=${onDiscard}>${Icon.x}</button>`}
                            ${item.kind === "queued" && html`
                                <button class="ibtn discard" type="button" aria-label="Cancel" disabled=${busy} onClick=${onCancel}>${Icon.x}</button>`}
                        </span>
                    </div>
                </div>
            </article>`;
    }

    const NAV_ITEMS = [
        { key: "all", label: "All drops", icon: Icon.grid },
        { key: "pending", label: "Pending approval", icon: Icon.clock },
        { key: "uploaded", label: "Uploaded", icon: Icon.uploaded },
        { key: "queued", label: "Queued", icon: Icon.queued },
    ];

    const EMPTY_COPY = {
        all: "No drops yet — new captures appear here to approve.",
        pending: "Nothing pending — you're all caught up.",
        uploaded: "No uploads yet.",
        queued: "Nothing queued.",
    };

    function App() {
        const [items, setItems] = useState(null); // null = first load
        const [online, setOnline] = useState(true);
        const [authFailed, setAuthFailed] = useState(false);
        const [filter, setFilter] = useState("all");
        const [dragging, setDragging] = useState(false);
        const [uploadErr, setUploadErr] = useState("");
        const fileInputRef = useRef(null);
        const dragDepth = useRef(0);
        const timers = useRef([]);

        useEffect(() => () => { timers.current.forEach(clearTimeout); }, []);

        // Suppress the browser default for a file dropped ANYWHERE on the page
        // (e.g. the sidebar) — otherwise the browser navigates to the file and
        // blows the dashboard away. The upload/overlay stay scoped to <main>.
        useEffect(() => {
            const prevent = (e) => e.preventDefault();
            window.addEventListener("dragover", prevent);
            window.addEventListener("drop", prevent);
            return () => {
                window.removeEventListener("dragover", prevent);
                window.removeEventListener("drop", prevent);
            };
        }, []);

        useEffect(() => {
            let alive = true;
            const tick = async () => {
                try {
                    const res = await fetch(withToken("/api/items"), { cache: "no-store" });
                    // 403 means the daemon is up but our token is missing/stale — a
                    // distinct state from an unreachable daemon, with its own fix.
                    if (res.status === 403) {
                        if (!alive) return;
                        setAuthFailed(true);
                        setOnline(true);
                        return;
                    }
                    if (!res.ok) throw new Error("bad status");
                    const data = await res.json();
                    if (!alive) return;
                    setItems(Array.isArray(data.items) ? data.items : []);
                    setAuthFailed(false);
                    setOnline(true);
                } catch (_) {
                    if (!alive) return;
                    setOnline(false); // keep whatever we last had
                }
            };
            tick();
            const iv = setInterval(tick, 2000);
            return () => { alive = false; clearInterval(iv); };
        }, []);

        const list = items || [];
        const counts = {
            all: list.length,
            pending: list.filter((it) => it.kind === "pending").length,
            uploaded: list.filter((it) => it.kind === "uploaded").length,
            queued: list.filter((it) => it.kind === "queued").length,
        };
        const visible = filter === "all" ? list : list.filter((it) => it.kind === filter);

        const onRemove = (kind, id) =>
            setItems((prev) => (prev || []).filter((x) => !(x.kind === kind && x.id === id)));

        // Uploads synthesise an "uploaded" item as soon as /api/upload responds,
        // so it appears instantly rather than waiting for the next poll;
        // de-dupe by id so the poll's copy (possibly with a thumbnail) simply
        // replaces it.
        const onUploaded = (item) =>
            setItems((prev) => [item, ...(prev || []).filter((x) => x.id !== item.id)]);

        // Files upload sequentially so the clipboard ends on the LAST file's
        // URL deterministically; the daemon already copies it server-side too.
        const uploadAll = async (fileList) => {
            const files = Array.from(fileList || []);
            if (files.length === 0) return;
            setUploadErr("");
            let lastUrl = "";
            for (const file of files) {
                try {
                    const fd = new FormData();
                    // Field name must be "file" — the server reads form.get("file").
                    fd.append("file", file);
                    const res = await fetch(withToken("/api/upload"), { method: "POST", body: fd });
                    if (!res.ok) {
                        let msg = "Upload failed";
                        try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (_) {}
                        throw new Error(msg);
                    }
                    const j = await res.json();
                    if (j && j.url) lastUrl = j.url;
                    if (j && j.key) {
                        onUploaded({
                            id: j.key,
                            kind: "uploaded",
                            fileName: file.name,
                            date: new Date().toISOString(),
                            url: j.url || null,
                            thumb: false,
                        });
                    }
                } catch (e) {
                    // Surface the failure and stop; files already uploaded remain.
                    setUploadErr(`Couldn't upload ${file.name}: ${(e && e.message) || "Upload failed"}`);
                    timers.current.push(setTimeout(() => setUploadErr(""), 6000));
                    return;
                }
            }
            if (lastUrl) { try { await navigator.clipboard.writeText(lastUrl); } catch (_) {} }
        };

        const openPicker = () => { if (fileInputRef.current) fileInputRef.current.click(); };
        const onPick = (e) => { uploadAll(e.target.files); e.target.value = ""; };

        // The entire main area is a drop zone; only show the overlay once a
        // real file drag enters (not text/link drags), tracking enter/leave
        // depth so a drag over a child element doesn't flicker it off.
        const isFileDrag = (e) =>
            e.dataTransfer && Array.prototype.indexOf.call(e.dataTransfer.types || [], "Files") !== -1;
        const onDragEnter = (e) => {
            if (!isFileDrag(e)) return;
            e.preventDefault();
            dragDepth.current++;
            setDragging(true);
        };
        const onDragOver = (e) => { if (isFileDrag(e)) e.preventDefault(); };
        const onDragLeave = (e) => {
            if (!isFileDrag(e)) return;
            dragDepth.current = Math.max(0, dragDepth.current - 1);
            if (dragDepth.current === 0) setDragging(false);
        };
        const onDrop = (e) => {
            e.preventDefault();
            dragDepth.current = 0;
            setDragging(false);
            uploadAll(e.dataTransfer && e.dataTransfer.files);
        };

        // Group the already-sorted (newest-first) items under date headers.
        const groups = [];
        for (const it of visible) {
            const label = groupLabel(it.date);
            let g = groups[groups.length - 1];
            if (!g || g.label !== label) { g = { label, items: [] }; groups.push(g); }
            g.items.push(it);
        }

        return html`
            <aside class="rail">
                <div class="brand">
                    <span class="brand-mark">
                        ${BrandMark}
                        <span class=${"status-dot" + (authFailed || !online ? " off" : "")} aria-hidden="true"></span>
                    </span>
                    <span class="brand-word">Spootie</span>
                </div>

                <button class="rail-upload" type="button" onClick=${openPicker}>
                    ${Icon.upload} Upload a file
                </button>
                <input ref=${fileInputRef} type="file" multiple hidden onChange=${onPick} />

                <nav class="nav">
                    ${NAV_ITEMS.map((n) => html`
                        <button
                            key=${n.key}
                            class=${"nav-item" + (filter === n.key ? " is-active" : "")}
                            type="button"
                            onClick=${() => setFilter(n.key)}>
                            ${n.icon}
                            ${n.label}
                            <span class="nav-count">${counts[n.key]}</span>
                        </button>`)}
                </nav>

                <div class="rail-spacer"></div>

                <div class="rail-foot">
                    <p class="stat">${counts.all} drop${counts.all === 1 ? "" : "s"}</p>
                    <p>Links expire after 7 days</p>
                </div>
            </aside>

            <main
                class=${"main" + (dragging ? " is-dragging" : "")}
                onDragEnter=${onDragEnter}
                onDragOver=${onDragOver}
                onDragLeave=${onDragLeave}
                onDrop=${onDrop}>
                <div class="toolbar">
                    <h1 class="page-title">Drops</h1>
                    ${counts.pending > 0 && html`
                        <button class="page-sub" type="button" onClick=${() => setFilter("pending")}>
                            ${counts.pending} waiting for your review
                        </button>`}
                </div>

                <div class="content">
                    ${authFailed
                        ? html`<div class="banner">Session expired — run <code>spootie ui</code> in your terminal to reopen the dashboard.</div>`
                        : !online && items !== null
                            ? html`<div class="banner">Can't reach the daemon — retrying every 2s…</div>`
                            : null}
                    ${uploadErr && html`<div class="banner err">${uploadErr}</div>`}

                    ${items === null
                        ? null
                        : visible.length === 0
                            ? html`
                                <div class="empty">
                                    ${Icon.file}
                                    <p>${EMPTY_COPY[filter]}</p>
                                </div>`
                            : groups.map((g) => html`
                                <div key=${g.label}>
                                    <h2 class="date-heading">${g.label}</h2>
                                    <div class="grid">
                                        ${g.items.map((it) => html`
                                            <${Tile} key=${it.kind + ":" + it.id} item=${it} onRemove=${onRemove} />`)}
                                    </div>
                                </div>`)}
                </div>

                <div class="drop-overlay" aria-hidden="true">
                    <div class="drop-overlay-label">${Icon.dropArrow} Drop to upload</div>
                </div>
            </main>
        `;
    }

    render(html`<${App} />`, document.getElementById("app"));
</script>
