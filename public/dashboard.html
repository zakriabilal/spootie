<title>Spootie</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<style>
    :root {
        color-scheme: dark;
        --bg: #0a0a0c;
        --bg-elev: #0e0e11;
        --fg: #e7e7ea;
        --muted: #71717a;
        --faint: #52525b;
        --border: rgba(255, 255, 255, 0.07);
        --border-strong: rgba(255, 255, 255, 0.12);
        --hover: rgba(255, 255, 255, 0.028);
        --accent: #7dd992;
        --queued: #d9a95e;
        --danger: #e07070;
        --bar-h: 53px;
        --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Monaco, "Cascadia Code", monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
    }

    body {
        font-family: var(--sans);
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
    }

    ::selection { background: rgba(125, 217, 146, 0.22); }

    #app { max-width: 680px; margin: 0 auto; }

    /* ---- top bar ---- */
    .bar {
        position: sticky;
        top: 0;
        z-index: 20;
        height: var(--bar-h);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: color-mix(in srgb, var(--bg) 82%, transparent);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
    }
    .wordmark {
        font-family: var(--sans);
        font-weight: 600;
        font-size: 15px;
        letter-spacing: -0.01em;
        color: var(--fg);
        display: flex;
        align-items: baseline;
        gap: 7px;
    }
    .wordmark .prompt {
        font-family: var(--mono);
        color: var(--faint);
        font-weight: 400;
        font-size: 13px;
    }
    .conn {
        display: flex;
        align-items: center;
        gap: 7px;
        font-family: var(--mono);
        font-size: 11.5px;
        letter-spacing: 0.02em;
        color: var(--muted);
        text-transform: lowercase;
    }
    .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex: none;
        background: var(--faint);
    }
    .dot.live { background: var(--accent); animation: pulse 2.4s ease-in-out infinite; }
    .dot.off  { background: var(--queued); animation: pulse 1.2s ease-in-out infinite; }

    /* ---- drop zone (upload any file) ---- */
    .dropzone {
        margin: 18px 20px 6px;
        padding: 26px 20px;
        border: 1.5px dashed var(--border-strong);
        border-radius: 10px;
        background: var(--bg-elev);
        text-align: center;
        cursor: pointer;
        user-select: none;
        transition: border-color 0.14s ease, background 0.14s ease;
    }
    .dropzone:hover { border-color: rgba(255, 255, 255, 0.2); }
    .dropzone:focus-visible {
        outline: none;
        border-color: var(--border-strong);
    }
    .dropzone.drag {
        border-color: var(--accent);
        background: rgba(125, 217, 146, 0.06);
    }
    .dropzone.err { border-color: rgba(224, 112, 112, 0.5); }
    .dz-title {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--fg);
        margin-bottom: 4px;
    }
    .dropzone.drag .dz-title { color: var(--accent); }
    .dropzone.done .dz-title { color: var(--accent); }
    .dropzone.err .dz-title { color: var(--danger); }
    .dz-hint {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--faint);
    }

    /* ---- selection toolbar (between drop zone and list) ---- */
    .toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        min-height: 38px;
        padding: 7px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-elev);
        font-family: var(--mono);
    }
    .toolbar .spacer { flex: 1 1 auto; }
    .tb-count {
        font-size: 11px;
        letter-spacing: 0.04em;
        color: var(--muted);
        white-space: nowrap;
    }
    .tb-status {
        font-size: 11px;
        letter-spacing: 0.02em;
        color: var(--muted);
        white-space: nowrap;
    }
    .tb-status.err { color: var(--danger); }
    .tb-confirm {
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .tb-confirm-q {
        font-size: 11px;
        color: var(--danger);
        white-space: nowrap;
    }

    /* ---- per-row selection checkbox ---- */
    .checkbox {
        width: 16px;
        height: 16px;
        flex: none;
        border-radius: 4px;
        border: 1px solid var(--border-strong);
        background: var(--bg-elev);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1;
        color: var(--bg);
    }
    .checkbox.on { background: var(--accent); border-color: var(--accent); }
    .row.selectable { cursor: pointer; user-select: none; }
    .row.selected { background: rgba(125, 217, 146, 0.06); }
    .row.selectable:focus-visible {
        outline: 1px solid var(--border-strong);
        outline-offset: -1px;
    }

    /* ---- offline banner ---- */
    .banner {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--queued);
        padding: 9px 20px;
        border-bottom: 1px solid var(--border);
        background: rgba(217, 169, 94, 0.05);
    }

    /* ---- date group headers ---- */
    .group-head {
        position: sticky;
        top: var(--bar-h);
        z-index: 10;
        padding: 16px 20px 7px;
        font-family: var(--mono);
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--faint);
        background: color-mix(in srgb, var(--bg) 88%, transparent);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    /* ---- rows ---- */
    .row {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 10px 20px;
        border-bottom: 1px solid var(--border);
        animation: rowIn 0.24s ease both;
    }
    .row:hover { background: var(--hover); }

    .row .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex: none;
        background: var(--accent);
    }
    .row.queued .status-dot { background: var(--queued); animation: pulse 1.4s ease-in-out infinite; }

    /* ---- thumbnail (local sips preview) / placeholder ---- */
    .thumb, .thumb-ph {
        width: 48px;
        height: 48px;
        flex: none;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg-elev);
    }
    .thumb { object-fit: cover; display: block; }
    .thumb-ph {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--mono);
        font-size: 16px;
        color: var(--faint);
    }

    .meta {
        min-width: 0;
        flex: 1 1 auto;
        display: flex;
        align-items: baseline;
        gap: 8px;
        font-family: var(--mono);
    }
    .name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        color: var(--fg);
    }
    .sep { color: var(--border-strong); flex: none; }
    .time { flex: none; font-size: 12px; color: var(--muted); }
    .qlabel {
        flex: none;
        font-size: 11px;
        color: var(--queued);
        letter-spacing: 0.02em;
    }
    .qlabel .dots::after {
        content: "";
        animation: ellipsis 1.6s steps(4, end) infinite;
    }

    /* ---- actions ---- */
    .actions {
        flex: none;
        display: flex;
        align-items: center;
        gap: 2px;
        opacity: 0.55;
        transition: opacity 0.12s ease;
    }
    .row:hover .actions,
    .row:focus-within .actions { opacity: 1; }

    .btn {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        background: none;
        border: 1px solid transparent;
        border-radius: 5px;
        padding: 4px 8px;
        cursor: pointer;
        transition: color 0.12s ease, background 0.12s ease, border-color 0.12s ease;
        white-space: nowrap;
    }
    .btn:hover { color: var(--fg); background: rgba(255, 255, 255, 0.04); }
    .btn:focus-visible {
        outline: none;
        border-color: var(--border-strong);
        color: var(--fg);
    }
    .btn.copied { color: var(--accent); }
    .btn.danger { color: var(--danger); }
    .btn.armed { color: var(--danger); border-color: rgba(224, 112, 112, 0.4); background: rgba(224, 112, 112, 0.08); }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .row-err {
        padding: 0 20px 9px 38px;
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--danger);
    }

    /* ---- empty / loading ---- */
    .placeholder {
        text-align: center;
        padding: 90px 20px;
        color: var(--muted);
    }
    .placeholder .glyph {
        font-family: var(--mono);
        font-size: 22px;
        color: var(--faint);
        margin-bottom: 12px;
    }
    .placeholder h2 {
        margin: 0 0 6px;
        font-size: 15px;
        font-weight: 600;
        color: var(--fg);
    }
    .placeholder p { margin: 0; font-size: 13px; color: var(--muted); }

    .foot {
        padding: 22px 20px 40px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--faint);
        text-align: center;
    }

    /* ---- persistent brand/status line ---- */
    .brandbar {
        padding: 14px 20px 34px;
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.02em;
        color: var(--faint);
        text-align: center;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.32; } }
    @keyframes rowIn { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: none; } }
    @keyframes ellipsis { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; } }

    @media (prefers-reduced-motion: reduce) {
        .row { animation: none; }
        .dot, .status-dot, .qlabel .dots::after { animation: none !important; }
    }

    @media (max-width: 520px) {
        .group-head { padding-left: 16px; padding-right: 16px; }
        .row { padding-left: 16px; padding-right: 16px; }
        .bar { padding: 0 16px; }
        .actions { opacity: 1; }
        .dropzone { margin-left: 16px; margin-right: 16px; }
    }
</style>

<div id="app"></div>

<script type="module">
    import {
        html, render, useState, useEffect, useRef,
    } from "/vendor/preact-standalone.mjs";

    // The API token comes from the URL `spootie ui` opens; keep it in this tab's
    // sessionStorage and resend it as a `token` query param on every API call.
    // (No cookie: cookies can't be port-scoped and would leak it to other
    // 127.0.0.1 servers.)
    const TOKEN = (() => {
        const fromUrl = new URL(location.href).searchParams.get("token");
        try {
            if (fromUrl) { sessionStorage.setItem("spootie_token", fromUrl); return fromUrl; }
            return sessionStorage.getItem("spootie_token") || "";
        } catch (_) {
            return fromUrl || "";
        }
    })();

    // Port the dashboard is served on, read from the URL for the status line.
    const PORT = location.port || "?";

    const withToken = (path) =>
        path + (path.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(TOKEN);

    /**
     * Copy text via the Clipboard API. The dashboard is only served over
     * loopback (a secure context), so writeText is always available; return
     * false only if it rejects.
     */
    const copyText = async (text) => {
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch (_) {
            return false;
        }
    };

    const startOfDay = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate());

    /** "Today" / "Yesterday" / "28 June 2026" for a date-group header. */
    const groupLabel = (iso) => {
        const dt = new Date(iso);
        if (Number.isNaN(dt.getTime())) return "Unknown date";
        const diff = Math.round((startOfDay(new Date()) - startOfDay(dt)) / 86400000);
        if (diff === 0) return "Today";
        if (diff === 1) return "Yesterday";
        return dt.toLocaleDateString(undefined, { day: "numeric", month: "long", year: "numeric" });
    };

    /** 24-hour HH:MM:SS, matching the tool's terminal-metadata feel. */
    const fmtTime = (iso) => {
        const dt = new Date(iso);
        if (Number.isNaN(dt.getTime())) return "--:--:--";
        return dt.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
    };

    const deleteItem = async (kind, id) => {
        const res = await fetch(withToken("/api/delete"), {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ kind, id }),
        });
        if (!res.ok) {
            let msg = "Delete failed";
            try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (_) {}
            throw new Error(msg);
        }
    };

    /**
     * Delete several items in one request (multi-select and "Empty all" both use
     * this; Empty all just passes every id). The server replies { ok, deleted,
     * failed } with 200 (all gone), 207 (partial), or 502 (all failed). fetch's
     * res.ok covers 200/207, so a partial success returns normally and the caller
     * surfaces failed.length; only a 502/parse failure throws. Returns the parsed
     * body so the caller can prune the confirmed-deleted ids optimistically.
     */
    const deleteBatch = async (ids) => {
        const res = await fetch(withToken("/api/delete-batch"), {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ keys: ids }),
        });
        let data = null;
        try { data = await res.json(); } catch (_) {}
        if (!data || !Array.isArray(data.deleted) || !Array.isArray(data.failed)) {
            // 403 (plain text), 400 ({error}), or an unparseable body.
            throw new Error((data && data.error) || "Delete failed");
        }
        if (!res.ok && data.deleted.length === 0) {
            // 502: everything failed. Nothing was removed server-side.
            throw new Error(data.failed.length + " item" + (data.failed.length === 1 ? "" : "s") + " failed");
        }
        return data;
    };

    /** "3 items failed" / "" — the trailing status a batch delete leaves behind. */
    const failSummary = (failed) =>
        failed && failed.length
            ? failed.length + " item" + (failed.length === 1 ? "" : "s") + " failed"
            : "";

    /**
     * A destructive control that arms before it fires — no window.confirm. Idle
     * shows `label`; clicking arms it into a red "Really delete N items? Yes / No"
     * that disarms on No or after ~5s. Yes runs `onConfirm` (async), showing
     * "Deleting…" and then any summary string it returns (e.g. partial failures)
     * or the thrown error, briefly, before returning to idle. Used for both
     * "Delete selected" and the quieter "Empty all".
     */
    function ConfirmAction({ label, count, disabled, quiet, onConfirm }) {
        const [phase, setPhase] = useState("idle"); // idle | armed | busy | result
        const [msg, setMsg] = useState("");
        const [msgErr, setMsgErr] = useState(false);
        const timers = useRef([]);

        useEffect(() => () => { timers.current.forEach(clearTimeout); }, []);
        const track = (fn, ms) => { timers.current.push(setTimeout(fn, ms)); };

        const arm = () => {
            setPhase("armed");
            // Auto-disarm if the user walks away; only if still armed.
            track(() => setPhase((p) => (p === "armed" ? "idle" : p)), 5000);
        };
        const confirm = async () => {
            setPhase("busy");
            try {
                const summary = await onConfirm();
                if (summary) {
                    setMsg(summary);
                    setMsgErr(false);
                    setPhase("result");
                    track(() => setPhase("idle"), 4000);
                } else {
                    setPhase("idle");
                }
            } catch (e) {
                setMsg((e && e.message) || "Delete failed");
                setMsgErr(true);
                setPhase("result");
                track(() => setPhase("idle"), 4000);
            }
        };

        if (phase === "busy") return html`<span class="tb-status">Deleting…</span>`;
        if (phase === "result") {
            return html`<span class=${"tb-status" + (msgErr ? " err" : "")}>${msg}</span>`;
        }
        if (phase === "armed") {
            return html`
                <span class="tb-confirm">
                    <span class="tb-confirm-q">Really delete ${count} item${count === 1 ? "" : "s"}?</span>
                    <button class="btn danger armed" onClick=${confirm}>Yes</button>
                    <button class="btn" onClick=${() => setPhase("idle")}>No</button>
                </span>`;
        }
        return html`
            <button
                class=${"btn" + (quiet ? "" : " danger")}
                onClick=${arm}
                disabled=${disabled}>
                ${label}
            </button>`;
    }

    /**
     * Compact row between the drop zone and the list, shown whenever there are
     * items. Out of selection mode it offers a "Select" toggle and a quiet
     * "Empty all"; in selection mode it shows the selected count, All/None quick
     * links, an armed "Delete selected (n)", and Cancel.
     */
    function Toolbar({
        items, selecting, selected,
        onEnter, onExit, onAll, onNone, onDeleteSelected, onEmptyAll,
    }) {
        if (!selecting) {
            return html`
                <div class="toolbar">
                    <button class="btn" onClick=${onEnter}>Select</button>
                    <span class="spacer"></span>
                    <${ConfirmAction}
                        label="Empty all"
                        count=${items.length}
                        quiet=${true}
                        onConfirm=${onEmptyAll} />
                </div>`;
        }
        const n = selected.size;
        return html`
            <div class="toolbar">
                <span class="tb-count">${n} selected</span>
                <button class="btn" onClick=${onAll}>All</button>
                <button class="btn" onClick=${onNone}>None</button>
                <span class="spacer"></span>
                <${ConfirmAction}
                    label=${"Delete selected (" + n + ")"}
                    count=${n}
                    disabled=${n === 0}
                    onConfirm=${onDeleteSelected} />
                <button class="btn" onClick=${onExit}>Cancel</button>
            </div>`;
    }

    function Row({ item, onRemove, selecting, selected, onToggle }) {
        const [copied, setCopied] = useState(false);
        const [armed, setArmed] = useState(false);
        const [busy, setBusy] = useState(false);
        const [err, setErr] = useState("");
        const timers = useRef([]);

        useEffect(() => () => { timers.current.forEach(clearTimeout); }, []);
        const track = (fn, ms) => { timers.current.push(setTimeout(fn, ms)); };

        const onCopy = async () => {
            const ok = await copyText(item.url || "");
            if (ok) {
                setErr("");
                setCopied(true);
                track(() => setCopied(false), 1400);
            } else {
                setErr("Couldn't copy to clipboard");
            }
        };

        const onDelete = async () => {
            if (!armed) {
                setErr("");
                setArmed(true);
                track(() => setArmed(false), 3000);
                return;
            }
            setBusy(true);
            try {
                await deleteItem(item.kind, item.id);
                onRemove(item.kind, item.id);
            } catch (e) {
                setBusy(false);
                setArmed(false);
                setErr(e.message || "Delete failed");
            }
        };

        const queued = item.kind === "queued";
        // Thumbnails are local-only; <img> can't send headers, so the token
        // rides the query string like every other API call.
        const thumbSrc = item.thumb
            ? withToken("/api/thumb?key=" + encodeURIComponent(item.id))
            : null;
        // In selection mode the whole row is a checkbox: clicking (or Space/Enter)
        // toggles it, and the per-item actions give way to the checkbox.
        const onRowClick = selecting ? () => onToggle(item.id) : null;
        const onRowKey = selecting
            ? (e) => {
                if (e.key === " " || e.key === "Enter") { e.preventDefault(); onToggle(item.id); }
            }
            : null;
        return html`
            <div
                class=${"row" + (queued ? " queued" : "") + (selecting ? " selectable" : "") + (selecting && selected ? " selected" : "")}
                onClick=${onRowClick}
                onKeyDown=${onRowKey}
                role=${selecting ? "checkbox" : null}
                aria-checked=${selecting ? (selected ? "true" : "false") : null}
                tabindex=${selecting ? "0" : null}>
                ${selecting
                    ? html`<span class=${"checkbox" + (selected ? " on" : "")} aria-hidden="true">${selected ? "✓" : ""}</span>`
                    : html`<span class="status-dot"></span>`}
                ${thumbSrc
                    ? html`<img class="thumb" loading="lazy" alt="" src=${thumbSrc} />`
                    : html`<span class="thumb-ph" aria-hidden="true">▤</span>`}
                <div class="meta">
                    <span class="name" title=${item.fileName}>${item.fileName}</span>
                    <span class="sep">·</span>
                    ${queued
                        ? html`<span class="qlabel">queued, retry pending<span class="dots"></span></span>`
                        : html`<span class="time">${fmtTime(item.date)}</span>`}
                </div>
                ${!selecting && html`
                    <div class="actions">
                        ${!queued && html`
                            <button class=${"btn" + (copied ? " copied" : "")} onClick=${onCopy}>
                                ${copied ? "Copied" : "Copy"}
                            </button>`}
                        <button
                            class=${"btn danger" + (armed ? " armed" : "")}
                            onClick=${onDelete}
                            disabled=${busy}
                            title=${queued ? "Cancel this queued upload" : "Delete from R2"}>
                            ${busy ? "…" : armed ? "Sure?" : queued ? "Cancel" : "Delete"}
                        </button>
                    </div>`}
            </div>
            ${!selecting && err && html`<div class="row-err">${err}</div>`}
        `;
    }

    /**
     * Large drop zone at the top of the page: drop files here (or click to
     * browse) and each is POSTed to /api/upload as its own multipart request.
     * The daemon uploads to R2, records history, and copies the share URL
     * server-side; new items surface via the existing 2s poll, so nothing is
     * injected here. Files upload sequentially so the clipboard ends on the
     * LAST file's URL deterministically.
     */
    function DropZone() {
        const [drag, setDrag] = useState(false);
        const [status, setStatus] = useState(null); // null | {kind, ...}
        const inputRef = useRef(null);
        const timers = useRef([]);

        useEffect(() => () => { timers.current.forEach(clearTimeout); }, []);

        // Stop the browser from navigating to a file dropped anywhere on the
        // page (outside the zone) — that would blow the dashboard away.
        useEffect(() => {
            const prevent = (e) => e.preventDefault();
            window.addEventListener("dragover", prevent);
            window.addEventListener("drop", prevent);
            return () => {
                window.removeEventListener("dragover", prevent);
                window.removeEventListener("drop", prevent);
            };
        }, []);

        const flashDone = (n) => {
            setStatus({ kind: "done", n });
            timers.current.push(setTimeout(() => setStatus(null), 2400));
        };

        const uploadAll = async (fileList) => {
            const files = Array.from(fileList || []);
            if (files.length === 0) return;
            let lastUrl = "";
            for (let i = 0; i < files.length; i++) {
                setStatus({ kind: "uploading", i: i + 1, n: files.length, name: files[i].name });
                try {
                    const fd = new FormData();
                    // Field name must be "file" — the server reads form.get("file").
                    fd.append("file", files[i]);
                    // No content-type header: the browser sets the multipart
                    // boundary. The token rides the query string like every call.
                    const res = await fetch(withToken("/api/upload"), { method: "POST", body: fd });
                    if (!res.ok) {
                        let msg = "Upload failed";
                        try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (_) {}
                        throw new Error(msg);
                    }
                    const j = await res.json();
                    if (j && j.url) lastUrl = j.url;
                } catch (e) {
                    setStatus({ kind: "error", msg: (e && e.message) || "Upload failed" });
                    return;
                }
            }
            // The daemon already copied the URL server-side; also copy the last
            // file's URL here as belt-and-braces, tolerating a rejection.
            if (lastUrl) { try { await navigator.clipboard.writeText(lastUrl); } catch (_) {} }
            flashDone(files.length);
        };

        const onDrop = (e) => {
            e.preventDefault();
            setDrag(false);
            uploadAll(e.dataTransfer && e.dataTransfer.files);
        };
        const onPick = (e) => {
            uploadAll(e.target.files);
            e.target.value = ""; // let the same file be re-picked
        };
        const openPicker = () => { if (inputRef.current) inputRef.current.click(); };
        const onKeyDown = (e) => {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openPicker(); }
        };

        let title = "Drop files to upload";
        if (status && status.kind === "uploading") {
            title = "Uploading " + status.i + " of " + status.n + "…";
        } else if (status && status.kind === "done") {
            title = status.n > 1 ? status.n + " files uploaded — link copied" : "Uploaded — link copied";
        } else if (status && status.kind === "error") {
            title = status.msg;
        }
        const cls = "dropzone"
            + (drag ? " drag" : "")
            + (status && status.kind === "done" ? " done" : "")
            + (status && status.kind === "error" ? " err" : "");

        return html`
            <div
                class=${cls}
                role="button"
                tabindex="0"
                onClick=${openPicker}
                onKeyDown=${onKeyDown}
                onDragEnter=${(e) => { e.preventDefault(); setDrag(true); }}
                onDragOver=${(e) => { e.preventDefault(); setDrag(true); }}
                onDragLeave=${(e) => { e.preventDefault(); setDrag(false); }}
                onDrop=${onDrop}>
                <input ref=${inputRef} type="file" multiple hidden onChange=${onPick} />
                <div class="dz-title">${title}</div>
                <div class="dz-hint">Drop files to upload · click to browse</div>
            </div>
        `;
    }

    function App() {
        const [items, setItems] = useState(null); // null = first load
        const [online, setOnline] = useState(true);
        const [authFailed, setAuthFailed] = useState(false);
        // Selection mode + the set of selected item ids. Kept here (not in the
        // Toolbar/Row) so it survives the 2s poll re-render; pruned below when the
        // items it references disappear.
        const [selecting, setSelecting] = useState(false);
        const [selected, setSelected] = useState(() => new Set());

        useEffect(() => {
            let alive = true;
            const tick = async () => {
                try {
                    const res = await fetch(withToken("/api/items"), { cache: "no-store" });
                    // 403 means the daemon is up but our token is missing/stale — a
                    // distinct state from an unreachable daemon, with its own fix.
                    if (res.status === 403) {
                        if (!alive) return;
                        setAuthFailed(true);
                        setOnline(true);
                        return;
                    }
                    if (!res.ok) throw new Error("bad status");
                    const data = await res.json();
                    if (!alive) return;
                    setItems(Array.isArray(data.items) ? data.items : []);
                    setAuthFailed(false);
                    setOnline(true);
                } catch (_) {
                    if (!alive) return;
                    setOnline(false); // keep whatever we last had
                }
            };
            tick();
            const iv = setInterval(tick, 2000);
            return () => { alive = false; clearInterval(iv); };
        }, []);

        // Prune selection against the live list every time it changes, so ids for
        // items that were deleted (here or elsewhere) drop out of the Set and the
        // "n selected" count never counts vanished rows. Leaving selection mode
        // when the list empties (e.g. after Empty all) keeps the toolbar honest.
        useEffect(() => {
            if (items === null) return;
            if (items.length === 0) {
                setSelecting(false);
                setSelected((prev) => (prev.size === 0 ? prev : new Set()));
                return;
            }
            setSelected((prev) => {
                if (prev.size === 0) return prev;
                const live = new Set(items.map((it) => it.id));
                let changed = false;
                const next = new Set();
                for (const id of prev) {
                    if (live.has(id)) next.add(id);
                    else changed = true;
                }
                return changed ? next : prev;
            });
        }, [items]);

        const onRemove = (kind, id) =>
            setItems((prev) => (prev || []).filter((x) => !(x.kind === kind && x.id === id)));

        // Optimistically drop confirmed-deleted ids from both the list and the
        // selection so the UI updates before the next poll reconciles.
        const onRemoveMany = (ids) => {
            const drop = new Set(ids);
            setItems((prev) => (prev || []).filter((x) => !drop.has(x.id)));
            setSelected((prev) => {
                if (prev.size === 0) return prev;
                const next = new Set(prev);
                for (const id of ids) next.delete(id);
                return next;
            });
        };

        const toggleSelected = (id) =>
            setSelected((prev) => {
                const next = new Set(prev);
                if (next.has(id)) next.delete(id);
                else next.add(id);
                return next;
            });

        const doDeleteSelected = async () => {
            const ids = [...selected];
            if (ids.length === 0) return "";
            const data = await deleteBatch(ids);
            onRemoveMany(data.deleted);
            return failSummary(data.failed);
        };

        const doEmptyAll = async () => {
            const ids = (items || []).map((it) => it.id);
            if (ids.length === 0) return "";
            const data = await deleteBatch(ids);
            onRemoveMany(data.deleted);
            return failSummary(data.failed);
        };

        // Group the already-sorted (newest-first) list under date headers.
        const groups = [];
        for (const it of items || []) {
            const label = groupLabel(it.date);
            let g = groups[groups.length - 1];
            if (!g || g.label !== label) { g = { label, items: [] }; groups.push(g); }
            g.items.push(it);
        }

        return html`
            <header class="bar">
                <div class="wordmark">Spootie<span class="prompt">~ screenshots</span></div>
                <div class="conn">
                    <span class=${"dot " + (authFailed || !online ? "off" : "live")}></span>
                    ${authFailed ? "reauth" : online ? "watching" : "reconnecting"}
                </div>
            </header>

            <${DropZone} />

            ${authFailed
                ? html`<div class="banner">Session expired — run <code>spootie ui</code> in your terminal to reopen the dashboard.</div>`
                : !online && items !== null
                    ? html`<div class="banner">Can't reach the daemon — retrying every 2s…</div>`
                    : null}

            ${items && items.length > 0
                ? html`<${Toolbar}
                        items=${items}
                        selecting=${selecting}
                        selected=${selected}
                        onEnter=${() => setSelecting(true)}
                        onExit=${() => { setSelecting(false); setSelected(new Set()); }}
                        onAll=${() => setSelected(new Set(items.map((it) => it.id)))}
                        onNone=${() => setSelected(new Set())}
                        onDeleteSelected=${doDeleteSelected}
                        onEmptyAll=${doEmptyAll} />`
                : null}

            ${items === null
                ? html`<div class="placeholder"><div class="glyph">◴</div><p>Connecting…</p></div>`
                : items.length === 0
                    ? html`
                        <div class="placeholder">
                            <div class="glyph">⌘⇧4</div>
                            <h2>No uploads yet</h2>
                            <p>Screenshots you confirm will show up here.</p>
                        </div>`
                    : html`
                        <main>
                            ${groups.map((g) => html`
                                <section>
                                    <div class="group-head">${g.label}</div>
                                    ${g.items.map((it) => html`
                                        <${Row}
                                            key=${it.kind + ":" + it.id}
                                            item=${it}
                                            onRemove=${onRemove}
                                            selecting=${selecting}
                                            selected=${selected.has(it.id)}
                                            onToggle=${toggleSelected} />`)}
                                </section>`)}
                            <div class="foot">— end of history —</div>
                        </main>`}

            <footer class="brandbar">Spootie · local dashboard on port ${PORT}</footer>
        `;
    }

    render(html`<${App} />`, document.getElementById("app"));
</script>
